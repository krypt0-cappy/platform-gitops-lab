apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -prod

replicas:
  - name: platform-status
    count: 3

patches:
  - target:
      kind: Ingress
      name: platform-status
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: platform-prod.local