apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-status-content
  namespace: platform-status
  labels:
    app.kubernetes.io/name: platform-status
    app.kubernetes.io/part-of: platform-lab
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Platform Status</title>
      <style>
        body {
          background: #111827;
          color: #f9fafb;
          font-family: Arial, sans-serif;
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
        }

        .card {
          background: #1f2937;
          border: 1px solid #374151;
          border-radius: 12px;
          padding: 32px;
          width: 420px;
        }

        .healthy {
          color: #34d399;
          font-weight: bold;
        }

        dt {
          color: #9ca3af;
          margin-top: 16px;
        }

        dd {
          margin: 4px 0 0;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>Platform Status</h1>
        <p class="healthy">● Operational</p>

        <dl>
          <dt>Environment</dt>
          <dd>Docker Desktop — Local</dd>

          <dt>Managed by</dt>
          <dd>Argo CD</dd>

          <dt>Deployment method</dt>
          <dd>GitOps</dd>

          <dt>Platform owner</dt>
          <dd>Platform Engineering</dd>
        </dl>
      </div>
    </body>
    </html>