apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.*
    helm:
      values: |
        controller:
          service:
            type: ClusterIP

          publishService:
            enabled: false

          extraArgs:
            publish-status-address: "127.0.0.1"

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    syncOptions:
      - CreateNamespace=true