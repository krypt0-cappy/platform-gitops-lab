apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform-status
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/krypt0-cappy/platform-gitops-lab.git
    targetRevision: main
    path: apps/platform-status/base

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-status

  syncPolicy:
    syncOptions:
      - CreateNamespace=true